name: Distracted_Driver
on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
jobs:
    quality-check:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: setup python
          uses: actions/setup-python@v5
          with:
            python-version: '3.10'
            cache: 'pip'
        
        - name: Install dependencies
          run: |
            pip install flake8 mypy pytest
            pip install -r requirements.txt
        
        - name: linting syntax
          run: flake8 src/

        - name: Type Checking (The "Compile" equivalent)
          run: mypy src/   